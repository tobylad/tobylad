# Trigger pipeline on push to main branch
trigger:
- main

# Specify the pool of agents to run the pipeline
pool:
  vmImage: 'ubuntu-latest'

# Define variables for easier management
variables:
  buildConfiguration: 'Release'
  azureSubscription: '<Your Azure Subscription>'
  appServiceName: '<Your App Service Name>'
  resourceGroupName: '<Your Resource Group Name>'
  packageDirectory: '$(Build.ArtifactStagingDirectory)/package'

# Define the steps for the pipeline
steps:
- task: NodeTool@0
  inputs:
    versionSpec: '16.x'
  displayName: 'Install Node.js'

- script: |
    npm install -g npm@latest
    npm install
  displayName: 'Install NPM Dependencies'

- script: npm run build
  displayName: 'Build Project'

- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: '$(Build.SourcesDirectory)'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
    replaceExistingArchive: true
  displayName: 'Archive Project Files'

- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'drop'
  displayName: 'Publish Build Artifacts'

- task: AzureWebApp@1
  inputs:
    azureSubscription: '$(azureSubscription)'
    appName: '$(appServiceName)'
    package: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
  displayName: 'Deploy to Azure Web App'
